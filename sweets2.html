<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Tokyo Cafe Guide - Cake & Donut</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 共通CSSファイルを読み込み -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="cafe-container">
  <!-- ヘッダーとナビゲーション -->
  <header class="cafe-header">
    <h1 class="site-title">Tokyo Cafe Guide</h1>
    <nav class="cafe-nav">
      <a href="index.html">ホーム</a>
      <a href="cafe.html">カフェ</a>
      <a href="sweets.html" class="active">スイーツ</a>
      <a href="area.html">エリア</a>
    </nav>
  </header>

  <!-- メインコンテンツ -->
  <main class="cafe-content">
    <h2 class="page-title">ケーキ＆ドーナツ特集</h2>

    <!-- 写真エリア（共通CSSの表示形式に統一） -->
    <div class="photo-area">
      <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?q=80&w=800" alt="ドーナツとケーキ" class="photo-placeholder" style="object-fit: cover;">
    </div>

    <!-- 店名 -->
    <h3 class="shop-name">スイート・ベイク・ショップ</h3>

    <!-- おすすめポイント -->
    <div class="recommend-section">
      <h4 class="section-title">おすすめポイント</h4>
      <p class="section-text">
        毎日お店で手作りしている、もちもち食感のカラフルドーナツと濃厚なクラシックショコラケーキが大人気です。
      </p>
    </div>

    <!-- 営業時間・アクセス -->
    <div class="info-section">
      <p><strong>営業時間：</strong> 10:00 〜 19:00</p>
      <p><strong>アクセス：</strong> 新宿駅 徒歩5分</p>
    </div>

    <!-- ページネーション -->
    <div class="pagination">
      <a href="sweets.html" class="prev">← パンケーキ＆パフェ特集</a>
      <a href="area.html" class="next">原宿・表参道エリア →</a>
    </div>
  </main>

  <!-- フッター -->
  <footer class="cafe-footer">
    <p>©2026 Tokyo Cafe Guide</p>
  </footer>
</div>
